<div style="padding:24px;">
  <h1>Superviseurs</h1>

  @if (isLoading()) {
    <p>Chargement...</p>
  } @else {
    <div style="margin-bottom:16px;">
      <mat-form-field appearance="outline" style="min-width:320px;">
        <mat-label>Recherche</mat-label>
        <input
          matInput
          [value]="texteFilter()"
          (input)="setTexteFilter($any($event.target).value)"
          placeholder="Nom, prénom, courriel"
        />
      </mat-form-field>
    </div>

    @if (errorMessage()) {
      <p style="color:red;">{{ errorMessage() }}</p>
    }

    <table
      mat-table
      [dataSource]="filteredSuperviseurs()"
      class="mat-elevation-z2"
      style="width:100%;"
    >
      <ng-container matColumnDef="nom">
        <th mat-header-cell *matHeaderCellDef>Nom</th>
        <td mat-cell *matCellDef="let row">
          {{ row.prenom }} {{ row.nom }}
        </td>
      </ng-container>

      <ng-container matColumnDef="email">
        <th mat-header-cell *matHeaderCellDef>Courriel</th>
        <td mat-cell *matCellDef="let row">
          {{ row.email }}
        </td>
      </ng-container>

      <ng-container matColumnDef="nbStages">
        <th mat-header-cell *matHeaderCellDef>Nb stages</th>
        <td mat-cell *matCellDef="let row">
          {{ row._count?.stagesCommeSuperviseur ?? 0 }}
        </td>
      </ng-container>

      <tr mat-header-row *matHeaderRowDef="displayedColumns"></tr>
      <tr mat-row *matRowDef="let row; columns: displayedColumns"></tr>
    </table>
  }
</div>
