<app-header />

<div style="display:flex; min-height:calc(100vh - 73px);">
  <aside
    style="
      width:240px;
      border-right:1px solid #ddd;
      padding:16px;
      background:#fafafa;
    "
  >
    <h3>Administration</h3>

    @if (isReadOnlyAdmin) {
      <p style="font-size:12px; color:#666;">
        Mode lecture seule
      </p>
    }

    <div style="display:flex; flex-direction:column; gap:8px;">
      <a mat-button [routerLink]="['/admin/manquants']">Stages à suivre</a>
      <a mat-button [routerLink]="['/admin/etudiants']">Étudiants</a>
      <a mat-button [routerLink]="['/admin/superviseurs']">Superviseurs</a>

      @if (!isReadOnlyAdmin) {
        <a mat-button [routerLink]="['/admin/etudiants/nouveau']">Ajouter un étudiant</a>
        <a mat-button [routerLink]="['/admin/affectation-superviseur']">Affectation superviseur</a>
        <a mat-button [routerLink]="['/admin/import-csv']">Import CSV</a>
      }
    </div>
  </aside>

  <main style="flex:1; padding:0;">
    <router-outlet />
  </main>
</div>
