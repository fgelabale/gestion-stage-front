<mat-sidenav-container class="stagiaire-shell">

  <!-- SIDEBAR -->
  <mat-sidenav mode="side" opened class="stagiaire-sidenav">

    <div class="stagiaire-sidenav-content">

      <div class="brand-block">
        <p class="brand-kicker">Portail</p>
        <h3>Espace stagiaire</h3>
      </div>

      <nav class="stagiaire-menu">

        <a mat-button routerLink="/stagiaire"
          routerLinkActive="menu-active"
          [routerLinkActiveOptions]="{ exact: true }">
          Tableau de bord
        </a>

        <a mat-button routerLink="/stagiaire/profil"
          routerLinkActive="menu-active"
          [routerLinkActiveOptions]="{ exact: true }">
          Mon profil
        </a>

        <a mat-button routerLink="/stagiaire/stages/nouveau"
          routerLinkActive="menu-active"
          [routerLinkActiveOptions]="{ exact: true }">
          Créer un stage
        </a>

      </nav>

    </div>

  </mat-sidenav>

  <!-- MAIN -->
  <mat-sidenav-content class="stagiaire-main">

    <!-- HEADER FIXE -->
    <mat-toolbar class="stagiaire-toolbar">

      <div class="toolbar-left">
        <span class="toolbar-title">Gestion de stages</span>
      </div>

      <div class="toolbar-right">

        <mat-button-toggle-group
          [value]="currentLang"
          (change)="setLang($event.value)"
          aria-label="Choix de la langue"
          class="lang-switch"
        >
          <mat-button-toggle value="fr">FR</mat-button-toggle>
          <mat-button-toggle value="en">EN</mat-button-toggle>
        </mat-button-toggle-group>

        <div class="user-pill">
          {{ currentUser()?.prenom || '' }}
          {{ currentUser()?.nom || '' }}
        </div>

        <button mat-stroked-button class="logout-btn" (click)="logout()">
          Déconnexion
        </button>

      </div>

    </mat-toolbar>

    <!-- CONTENU SCROLLABLE -->
    <div class="stagiaire-content">
      <router-outlet />
    </div>

  </mat-sidenav-content>

</mat-sidenav-container>
